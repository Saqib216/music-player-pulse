<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player App</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=jet-brains-mono@400&f[]=general-sans@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23b388ff'/%3E%3Cstop offset='100%25' stop-color='%23651fff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='24' height='24' rx='6' fill='%230a0a0a'/%3E%3Cpath d='M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z' fill='url(%23g)'/%3E%3C/svg%3E">
</head>

<body>
    <div class="top-branding">
        <span>PULSE</span> / MUSIC PLAYER
    </div>

    <div class="music-player">

        <div class="player-container">
            <div class="player-card">
                <div class="close-player"><i class="fa-solid fa-chevron-down"></i></div>

                <img src="" alt="" class="album-img">

                <h2 class="song-name">Sitaare</h2>
                <p class="artist-name">Arijit Singh</p>

                <div class="seekBar-container">
                    <div class="seek-bar">
                        <div class="seek-progress"></div>
                    </div>
                </div>

                <div class="time-display">
                    <span class="current-time">00:00</span>
                    <span class="total-time">00:00</span>
                </div>

                <div class="control-buttons">
                    <div class="prev-button"><i class="fa-solid fa-backward-step"></i></div>
                    <div class="play-button"><i class="fa-solid fa-play"></i>
                    </div>
                    <div class="next-button"><i class="fa-solid fa-forward-step"></i>
                    </div>
                </div>

                <div class="volume">
                    <div class="volume-icon"><i class="fa-solid fa-volume-high"></i>
                    </div>
                    <input type="range" class="volume-range">
                </div>
            </div>

            <div class="playlist">
                <h2>Up Next</h2>
                <ul class="songs-list"></ul>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
