<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player App</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=jet-brains-mono@400&f[]=general-sans@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="music-player">
        <div class="player-card">
            <img src="" alt="" class="album-img">

            <h2 class="song-name">Sitaare</h2>
            <p class="artist-name">Arijit Singh</p>

            <div class="seek-bar">
                <div class="seek-progress"></div>
            </div>

            <div class="time-display">
                <span class="current-time">00:00</span>
                <span class="total-time">00:00</span>
            </div>

            <div class="control-buttons">
                <div class="prev-button"><i class="fa-solid fa-backward-step"></i></div>
                <div class="play-button"><i class="fa-solid fa-play"></i>
                </div>
                <div class="next-button"><i class="fa-solid fa-forward-step"></i>
                </div>
            </div>

            <div class="volume">
                <div class="volume-icon"><i class="fa-solid fa-volume-high"></i>
                </div>
                <input type="range" class="volume-range">
            </div>
        </div>

        <div class="playlist">
            <h2>Up Next</h2>
            <ul class="songs-list"></ul>
        </div>
    </div>
    
    <script src="js/script.js"></script>
</body>

</html>
